{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciamento de Estoque 🏎️</title>
    <link rel="stylesheet" href="{% static 'css/Tela9Adicionar.css' %}">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=close" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=inventory_2" />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
</head>

<body>
    <div id="app">
        <header class="main-header">
            <div class="header-content">
                <div class="logo-area">
                    <div class="logo-icon">
                        <span class="material-symbols-outlined">inventory_2</span>
                    </div>
                    <div>
                        <h1>Gerenciamento de Estoque</h1>
                    </div>
                </div>
                <form action="{% url 'gerenciador'%}">
                    <button id="btn-exit" class="btn-primary">
                        <span class="material-symbols-outlined">close</span>
                        Sair
                    </button>
                </form>
            </div>
            <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
        </header>

        

        

        <div class="modal-box-aliamento">
            <div class="modal-box">
                <form action="{% url 'adicategoria' %}" method="post" enctype="multipart/form-data">
                    {% csrf_token %} 
                    {{ form }}



                    

                    <button type="submit" class="btn-submit-modal">Adicionar</button>
                </form>
            </div>
        </div>
    
</body>
</html>
