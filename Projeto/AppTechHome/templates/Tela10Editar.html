{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciamento de Estoque 🏎️</title>
    <link rel="stylesheet" href="{% static 'css/style2.css' %}">
    <link rel="stylesheet" href="{% static 'js/adicionar.js' %}">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=close" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=inventory_2" />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
</head>

<body>
    <div id="app">
        <header class="main-header">
            <div class="header-content">
                <div class="logo-area">
                    <div class="logo-icon">
                        <span class="material-symbols-outlined">inventory_2</span>
                    </div>
                    <div>
                        <h1>Gerenciamento de Estoque</h1>
                    </div>
                </div>
                <form action="{% url 'gerenciador'%}">
                    <button id="btn-exit" class="btn-primary">
                        <span class="material-symbols-outlined">close</span>
                        Sair
                    </button>
                </form>
            </div>
            <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
        </header>

        

        

        <div class="modal-box-aliamento">
            <div class="modal-box">
                <form aciton="{% url 'editar' produto.id %}" id="product-form" method="post" enctype="multipart/form-data">
                    {% csrf_token %} 

                    <div class="form-group">
                        <label>Imagem da Produto</label>
                        <input type="file" name="imagem" id="fileInput" hidden>

                        <label for="fileInput" class="file-upload">
                            <span id="fileText">  Clique para adicionar imagem</span>
                        </label>
                    </div>


                    <div class="form-group">
                        <label>Nome do Produto</label>
                        <input type="text" name="nome" id="f-name" required placeholder="Ex: Camiseta Básica" class="input-text" value="{{form.nome.value}}">
                    </div>
                    
                    <div class="form-group">
                        <label>Descrição do Produto</label>
                        <input type="text" name="descricao" id="f-name" required placeholder="Ex: E um produto bom" class="input-text" value="{{form.descricao.value}}">
                    </div>


                    <div class="select-wrapper">
                        <label>Categoria</label>
                        <select name="categoria" >
                            <option value="Categorias">Categorias</option>
                            {% for categoria in form.categoria.field.queryset %}
                                <option value="{{categoria.id}}">
                                    {% if categoria.id == form.categoria.value %}
                                        select
                                    {% endif %}
                                    {{categoria.nome}}
                                </option>
                            {% endfor %}
                        </select>
                    </div>

                
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>Quantidade</label>
                            <input type="number" name="estoque" id="f-qty" value="0" min="0" required class="input-text" value="{{form.estoque.value}}">
                        </div>
                        <div class="form-group">
                            <label>Valor Unitário (R$)</label>
                            <input type="number" name="preco" id="f-price" required class="input-text" value="{{form.preco.value}}">
                        </div>
                    </div>

                    <button type="submit" class="btn-submit-modal">Adicionar Produto</button>
                </form>
            </div>
        </div>
    
</body>
</html>
